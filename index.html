document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"2feb516a-f61e-41da-a958-6d64f398978c\"><\u002Fscript>\n\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n<style>/* ====================================================================\n   Apartment List — Webfonts\n   Haffer XH  — primary UI / body grotesque sans (Regular→Bold)\n   Thunder    — condensed display face (headlines, hero numbers)\n   ==================================================================== */\n\n@font-face {\n  font-family: \"Haffer XH\";\n  src: url(\"53252250-3e2c-492e-8c92-ff3487aa8bc2\") format(\"opentype\");\n  font-weight: 400;\n  font-style: normal;\n  font-display: swap;\n}\n@font-face {\n  font-family: \"Haffer XH\";\n  src: url(\"0204cb73-6ff4-43e4-9487-6483c60b03f9\") format(\"opentype\");\n  font-weight: 500;\n  font-style: normal;\n  font-display: swap;\n}\n@font-face {\n  font-family: \"Haffer XH\";\n  src: url(\"c9f263fc-fb75-4170-a586-fcfe0c958b96\") format(\"opentype\");\n  font-weight: 600;\n  font-style: normal;\n  font-display: swap;\n}\n@font-face {\n  font-family: \"Haffer XH\";\n  src: url(\"39f71254-bcd3-48dd-9ae9-628bf862fa23\") format(\"opentype\");\n  font-weight: 700;\n  font-style: normal;\n  font-display: swap;\n}\n\n/* Thunder SemiBold LC — a single condensed display weight.\n   Use UPPERCASE-to-lowercase (\"LC\") condensed display sparingly. */\n@font-face {\n  font-family: \"Thunder\";\n  src: url(\"e01c5866-8bfb-4e65-8360-bb660ef2282e\") format(\"opentype\");\n  font-weight: 600;\n  font-style: normal;\n  font-display: swap;\n}\n<\u002Fstyle>\n<style>/* ====================================================================\n   Apartment List — Color Tokens\n   Color is the single biggest identifier of the brand.\n   Primary palette is monochromatic purple; secondary adds vibrancy.\n   Source: Apartment List Brand Color Palette\n   ==================================================================== */\n\n:root {\n  /* ---- Primary palette ---------------------------------------- */\n  --al-indigo-purple: #6105C4;   /* primary — as important as the logo */\n  --al-darker-purple: #46137B;   /* deep purple, dense surfaces, text on light */\n  --al-natural-oat:   #F5F2ED;   /* warm off-white canvas / page background */\n\n  /* ---- Secondary palette -------------------------------------- */\n  --al-text-black:    #333333;   /* default body text */\n  --al-light-purple:  #C384F0;   /* accents, highlights, hover tints */\n  --al-lavender:      #DEC8FF;   /* soft fills, chips, selected states */\n  --al-orange:        #FF974D;   /* warm accent / \"flex\" energy */\n  --al-red:           #FF0029;   /* alerts, errors, sale/urgency */\n\n  /* ---- Neutrals (derived ramp, warm-leaning) ------------------ */\n  --al-white:         #FFFFFF;\n  --al-oat-50:        #FBFAF7;\n  --al-oat-100:       #F5F2ED;   /* = natural oat */\n  --al-gray-100:      #ECEAE6;\n  --al-gray-200:      #DDD9D2;\n  --al-gray-300:      #C5C0B8;\n  --al-gray-400:      #9C968C;\n  --al-gray-500:      #6F6A62;\n  --al-gray-600:      #4A463F;\n  --al-ink:           #1C1726;   /* near-black logo ink (dark plum) */\n\n  /* ---- Purple ramp (tints/shades of indigo) ------------------- */\n  --al-purple-50:     #F3EBFD;\n  --al-purple-100:    #E7D7FB;\n  --al-purple-200:    #DEC8FF;   /* = lavender */\n  --al-purple-300:    #C384F0;   /* = light purple */\n  --al-purple-500:    #6105C4;   /* = indigo purple */\n  --al-purple-700:    #46137B;   /* = darker purple */\n  --al-purple-900:    #2A0B49;\n\n  /* ---- Semantic aliases --------------------------------------- */\n  --color-brand:            var(--al-indigo-purple);\n  --color-brand-strong:     var(--al-darker-purple);\n  --color-brand-soft:       var(--al-lavender);\n  --color-brand-tint:       var(--al-purple-50);\n  --color-accent:           var(--al-light-purple);\n  --color-accent-warm:      var(--al-orange);\n\n  --surface-page:           var(--al-natural-oat);\n  --surface-card:           var(--al-white);\n  --surface-raised:         var(--al-white);\n  --surface-inverse:        var(--al-darker-purple);\n  --surface-brand:          var(--al-indigo-purple);\n  --surface-muted:          var(--al-oat-50);\n\n  --text-primary:           var(--al-text-black);\n  --text-heading:           var(--al-ink);\n  --text-secondary:         var(--al-gray-500);\n  --text-muted:             var(--al-gray-400);\n  --text-on-brand:          var(--al-white);\n  --text-link:              var(--al-indigo-purple);\n\n  --border-subtle:          var(--al-gray-200);\n  --border-default:         var(--al-gray-300);\n  --border-strong:          var(--al-ink);\n\n  --state-success:          #1F8A5B;\n  --state-warning:          var(--al-orange);\n  --state-error:            var(--al-red);\n  --state-info:             var(--al-indigo-purple);\n\n  --focus-ring:             var(--al-light-purple);\n}\n<\u002Fstyle>\n<style>/* ====================================================================\n   Apartment List — Typography Tokens\n   Haffer XH for UI/body. Thunder (condensed) for display moments.\n   ==================================================================== */\n\n:root {\n  /* ---- Families ----------------------------------------------- */\n  --font-sans:    \"Haffer XH\", \"Helvetica Neue\", Arial, sans-serif;\n  --font-display: \"Thunder\", \"Haffer XH\", \"Arial Narrow\", sans-serif;\n  --font-body:    var(--font-sans);\n\n  /* ---- Weights ------------------------------------------------ */\n  --fw-regular:   400; /* @kind font */\n  --fw-medium:    500; /* @kind font */\n  --fw-semibold:  600; /* @kind font */\n  --fw-bold:      700; /* @kind font */\n\n  /* ---- Type scale (rem, 16px base) ---------------------------- */\n  --fs-display-2xl: 5.5rem;   /* 88px — Thunder hero */\n  --fs-display-xl:  4rem;     /* 64px */\n  --fs-display-lg:  3rem;     /* 48px */\n  --fs-h1:          2.5rem;   /* 40px */\n  --fs-h2:          2rem;     /* 32px */\n  --fs-h3:          1.5rem;   /* 24px */\n  --fs-h4:          1.25rem;  /* 20px */\n  --fs-body-lg:     1.125rem; /* 18px */\n  --fs-body:        1rem;     /* 16px */\n  --fs-body-sm:     0.875rem; /* 14px */\n  --fs-caption:     0.75rem;  /* 12px */\n\n  /* ---- Line heights ------------------------------------------- */\n  --lh-tight:    1.05;   /* @kind font */\n  --lh-snug:     1.2;    /* @kind font */\n  --lh-normal:   1.5;    /* @kind font */\n  --lh-relaxed:  1.65;   /* @kind font */\n\n  /* ---- Letter spacing ----------------------------------------- */\n  --ls-display:  -0.01em;  /* @kind font */\n  --ls-heading:  -0.015em; /* @kind font */\n  --ls-body:     0;        /* @kind font */\n  --ls-caps:     0.06em;   /* @kind font */\n\n  /* ---- Semantic roles ----------------------------------------- */\n  --text-hero:        var(--fw-semibold) var(--fs-display-2xl)/var(--lh-tight) var(--font-display);\n  --text-display:     var(--fw-semibold) var(--fs-display-lg)/var(--lh-tight) var(--font-display);\n  --text-h1:          var(--fw-bold) var(--fs-h1)/var(--lh-snug) var(--font-sans);\n  --text-h2:          var(--fw-bold) var(--fs-h2)/var(--lh-snug) var(--font-sans);\n  --text-h3:          var(--fw-semibold) var(--fs-h3)/var(--lh-snug) var(--font-sans);\n  --text-body-role:   var(--fw-regular) var(--fs-body)/var(--lh-normal) var(--font-sans);\n}\n<\u002Fstyle>\n<style>/* ====================================================================\n   Apartment List — Spacing, Radius, Shadow, Motion Tokens\n   ==================================================================== */\n\n:root {\n  /* ---- Spacing scale (4px base) ------------------------------- */\n  --space-0:   0;\n  --space-1:   4px;\n  --space-2:   8px;\n  --space-3:   12px;\n  --space-4:   16px;\n  --space-5:   20px;\n  --space-6:   24px;\n  --space-8:   32px;\n  --space-10:  40px;\n  --space-12:  48px;\n  --space-16:  64px;\n  --space-20:  80px;\n  --space-24:  96px;\n  --space-32:  128px;\n\n  /* ---- Corner radii — friendly, generously rounded ------------ */\n  --radius-xs:    4px;\n  --radius-sm:    8px;\n  --radius-md:    12px;\n  --radius-lg:    16px;\n  --radius-xl:    24px;\n  --radius-2xl:   32px;\n  --radius-pill:  999px;   /* buttons & chips are pill-shaped */\n  --radius-circle: 50%;\n\n  /* ---- Shadows — soft, warm, low-contrast --------------------- */\n  --shadow-xs:  0 1px 2px rgba(28, 23, 38, 0.06);\n  --shadow-sm:  0 2px 6px rgba(28, 23, 38, 0.08);\n  --shadow-md:  0 6px 18px rgba(28, 23, 38, 0.10);\n  --shadow-lg:  0 14px 38px rgba(28, 23, 38, 0.14);\n  --shadow-xl:  0 28px 64px rgba(28, 23, 38, 0.18);\n  --shadow-brand: 0 12px 30px rgba(97, 5, 196, 0.28);\n\n  /* ---- Borders ------------------------------------------------ */\n  --border-width: 1px; /* @kind other */\n  --border-width-strong: 1.5px; /* @kind other */\n\n  /* ---- Layout ------------------------------------------------- */\n  --container-max: 1200px; /* @kind other */\n  --container-narrow: 880px; /* @kind other */\n  --header-height: 72px; /* @kind spacing */\n\n  /* ---- Motion — quick, eased, no bounce ----------------------- */\n  --ease-standard: cubic-bezier(0.4, 0, 0.2, 1); /* @kind other */\n  --ease-out:      cubic-bezier(0.16, 1, 0.3, 1); /* @kind other */\n  --ease-in:       cubic-bezier(0.4, 0, 1, 1); /* @kind other */\n  --dur-fast:   120ms; /* @kind other */\n  --dur-base:   200ms; /* @kind other */\n  --dur-slow:   320ms; /* @kind other */\n}\n<\u002Fstyle>\n<style>/* ====================================================================\n   Apartment List — Base element defaults\n   Lightweight resets + brand defaults consumers inherit.\n   ==================================================================== */\n\n*, *::before, *::after { box-sizing: border-box; }\n\nhtml { -webkit-text-size-adjust: 100%; }\n\nbody {\n  margin: 0;\n  font-family: var(--font-sans);\n  font-size: var(--fs-body);\n  line-heigh
